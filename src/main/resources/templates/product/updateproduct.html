<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
</head>
<body>
<form th:action="@{'/products/updateproduct/'+ ${product.getProductId()}}" method="post">

    <label for="name">Name: </label>
    <input type="text" id="name" name="newName" th:value="${product.getName()}" required>
    <br>
    <label for="price">Price: </label>
    <input type="number" id="price" name="newPrice" step="0.01"  th:value="${product.getPrice()}" required>
    <br>
    <input type="submit" value="Add">
</form>
</body>
</html>
